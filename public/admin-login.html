<!DOCTYPE html>
<html lang="mr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Krushi Kanchan</title>
  <style>
    :root {
      --green: #4CAF50;
      --green-dark: #2E7D32;
      --green-light: #A5D6A7;
      --text: #333;
      --bg: #f4f9f4;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(120deg, #f8f3ea, #eef5e8, #f5ede3, #e7efe1);
      background-size: 300% 300%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(rgba(169, 199, 163, 0.25) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-container img {
      width: 80px;
      margin-bottom: 20px;
    }

    .login-container h2 {
      color: var(--green-dark);
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
    }

    .error-msg {
      color: #d32f2f;
      background: #ffebee;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--green-dark);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--green);
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <img src="images/Gemini Generated Image.png" alt="Krushi Kanchan Logo">
    <h2>Admin Portal</h2>
    
    <div class="error-msg" id="errorMsg">Incorrect Username or Password.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">युझरनेम (Username)</label>
        <input type="text" id="username" placeholder="Enter Admin Username" required>
      </div>
      <div class="form-group">
        <label for="password">पासवर्ड (Password)</label>
        <input type="password" id="password" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn-submit">लॉगिन करा (Login)</button>
    </form>
    
    <a href="index.html" class="back-link">← मुख्य पृष्ठावर परत जा (Back to Home)</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.querySelector('.btn-submit');

      submitBtn.innerText = 'Loggin In...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('krushi_token', data.token);
          window.location.href = 'admin-dashboard.html';
        } else {
          errorMsg.innerText = data.error || 'Incorrect Username or Password.';
          errorMsg.style.display = 'block';
        }
      } catch (error) {
        errorMsg.innerText = 'Server error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.innerText = 'लॉगिन करा (Login)';
        submitBtn.disabled = false;
      }
    });
  </script>

</body>

</html>
